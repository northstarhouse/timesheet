<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timesheet — The North Star House</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --header:    #5a4428;
  --header-dk: #3e2e1a;
  --gold:      #886c44;
  --gold-lt:   #f0e8d8;
  --bg:        #f2f2f2;
  --surface:   #ffffff;
  --border:    #e4e4e4;
  --text:      #1c1b1a;
  --text-2:    #777;
  --text-3:    #aaa;
  --green:     #4caf80;
  --red:       #c0392b;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.app-header {
  background: var(--header);
  padding: 0 18px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.app-header img { height: 30px; width: auto; filter: brightness(0) invert(1); opacity: 0.9; }

.app-header h1 {
  font-size: 16px;
  font-weight: 700;
  color: #f8f4ec;
}

.header-spacer { flex: 1; }

.employee-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.employee-label { font-size: 11px; color: rgba(255,255,255,0.5); }

#employeeName {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 5px;
  color: #f8f4ec;
  font-size: 12px;
  font-family: inherit;
  padding: 4px 8px;
  outline: none;
  width: 130px;
  transition: background 0.12s;
}

#employeeName::placeholder { color: rgba(255,255,255,0.35); }
#employeeName:focus { background: rgba(255,255,255,0.2); }

.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: background 0.3s;
  margin-left: 4px;
}
.sync-dot.saving { background: #f0c040; }
.sync-dot.saved  { background: var(--green); }
.sync-dot.error  { background: var(--red); }

/* ── Body ── */
.body { max-width: 600px; margin: 0; padding: 0 0 68px; }

/* ── Add entry card ── */
.add-card {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  margin-bottom: 8px;
}

.add-label {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 8px;
  font-weight: 500;
}

textarea.what-input {
  width: 100%;
  border: none;
  outline: none;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  min-height: 38px;
  background: transparent;
  line-height: 1.4;
  margin-bottom: 10px;
}

textarea.what-input::placeholder { color: var(--text-3); }

.add-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* ── Duration selects ── */
.dur-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0 10px;
  height: 34px;
}

.dur-pill:focus-within { border-color: var(--gold); }

.dur-sel {
  background: transparent;
  border: none;
  outline: none;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  text-align: center;
}

#durH, #editDurH { width: 28px; }
#durM, #editDurM { width: 26px; }

.dur-sep { font-size: 12px; color: var(--text-3); }

select.cat-pill {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0 9px;
  height: 34px;
  font-size: 12px;
  color: var(--text-2);
  font-family: inherit;
  outline: none;
  cursor: pointer;
}

.add-btn {
  background: var(--header);
  color: #fff;
  border: none;
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
  flex-shrink: 0;
  margin-left: auto;
}

.add-btn:hover { background: var(--header-dk); }

/* ── Date nav ── */
.date-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}

.nav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-2);
  width: 26px; height: 26px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}

.nav-btn:hover { border-color: var(--gold); color: var(--gold); }

.date-nav-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.today-btn {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  background: var(--gold-lt);
  color: var(--gold);
  border: 1px solid #d4b88a;
  padding: 3px 9px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}

.today-btn:hover { background: #e8dac8; }

/* ── Pay period / week total bar ── */
.period-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 9px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
  gap: 12px;
}

.period-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-3);
}

.period-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
}

.period-range {
  font-size: 11px;
  color: var(--text-3);
  margin-left: auto;
}

/* ── Day header ── */
.day-section { margin-bottom: 2px; }

.day-header {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 9px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.day-name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-2);
  flex: 1;
  min-width: 100px;
}

.day-hours-row {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.day-hours-row label { font-size: 11px; color: var(--text-3); }

.time-pick {
  display: flex;
  align-items: center;
  gap: 1px;
}

.time-pick select {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12px;
  outline: none;
  font-family: inherit;
  padding: 2px 1px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.12s;
}

.time-pick select:focus { border-color: var(--gold); }

#dayStartH, #dayEndH { width: 24px; text-align: center; }
#dayStartM, #dayEndM { width: 22px; text-align: center; }
#dayStartA, #dayEndA { width: 28px; text-align: center; }

.time-colon { font-size: 11px; color: var(--text-3); }
.day-sep    { font-size: 11px; color: var(--text-3); }

.day-total {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
}

/* ── Entry rows ── */
.entry-row {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 11px 18px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: background 0.1s;
}

.entry-row:hover { background: #fafafa; }

.entry-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gold);
  margin-top: 5px;
  flex-shrink: 0;
}

.entry-body { flex: 1; min-width: 0; }

.entry-desc {
  font-size: 14px;
  color: var(--text);
  line-height: 1.45;
  word-break: break-word;
}

.entry-tags {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 5px;
  flex-wrap: wrap;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: capitalize;
}

.cat-general   { background: #f0efed; color: #7a756e; }
.cat-meeting   { background: #eaf5ee; color: #3a7d52; }
.cat-design    { background: #f0ecf8; color: #6b44a0; }
.cat-dev       { background: #eaf0f8; color: #2a5a9a; }
.cat-review    { background: #fdf3e8; color: #a05a1a; }
.cat-admin     { background: #fceaea; color: #a02828; }
.cat-marketing { background: #e8f4fd; color: #1a6a9a; }

.entry-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.entry-dur {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  min-width: 36px;
  text-align: right;
}

.entry-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.12s;
}

.entry-row:hover .entry-actions { opacity: 1; }

.entry-actions button {
  background: none;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  padding: 4px 5px;
  border-radius: 4px;
  font-size: 12px;
  transition: all 0.1s;
}

.entry-actions button:hover { background: var(--bg); color: var(--text); }
.entry-actions .del:hover { color: var(--red); background: #fceaea; }

/* ── Empty ── */
.empty-day {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 18px;
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
}

/* ── Export bar ── */
.export-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 9px 18px;
  display: flex;
  gap: 7px;
  align-items: center;
  max-width: 600px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.export-bar::-webkit-scrollbar { display: none; }

.exp-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
  white-space: nowrap;
  flex-shrink: 0;
}

.exp-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-lt); }
.exp-btn.primary { background: var(--header); border-color: var(--header); color: #fff; }
.exp-btn.primary:hover { background: var(--header-dk); border-color: var(--header-dk); color: #fff; }

.period-badge {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  white-space: nowrap;
  flex-shrink: 0;
  margin-right: 2px;
}

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 12px;
  padding: 22px;
  width: 100%; max-width: 440px;
  margin: 16px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.2);
}

.modal h2 {
  font-size: 16px; font-weight: 700;
  color: var(--text); margin-bottom: 14px;
}

.modal textarea {
  width: 100%;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 9px 12px;
  border-radius: 7px; font-size: 14px;
  outline: none; resize: vertical;
  min-height: 72px; font-family: inherit;
  margin-bottom: 10px; transition: border-color 0.12s;
}

.modal textarea:focus { border-color: var(--gold); }
.modal-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; }

.modal-footer button {
  padding: 8px 16px; border-radius: 7px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--bg); color: var(--text-2);
  transition: all 0.12s; font-family: inherit;
}

.modal-footer .save-btn { background: var(--header); border-color: var(--header); color: #fff; }
.modal-footer .save-btn:hover { background: var(--header-dk); color: #fff; }
.modal-footer button:hover { border-color: var(--gold); color: var(--gold); }
.modal-footer .save-btn:hover { border-color: var(--header-dk); }

/* ── Mobile ── */
@media (max-width: 540px) {
  .body { padding-bottom: 76px; }
  .add-card { padding: 12px 14px; }
  textarea.what-input { font-size: 16px; }
  .add-btn { width: 42px; height: 42px; }
  .day-header { padding: 9px 14px; }
  .day-name { width: 100%; flex: none; }
  .day-hours-row { gap: 4px; }
  .time-pick select { font-size: 13px; padding: 3px 1px; }
  #dayStartH, #dayEndH { width: 28px; }
  #dayStartM, #dayEndM { width: 26px; }
  #dayStartA, #dayEndA { width: 32px; }
  .entry-actions { opacity: 1; }
  .entry-actions button { padding: 6px 7px; font-size: 13px; }
  .entry-row { padding: 11px 14px; }
  .date-nav, .period-bar { padding: 9px 14px; }
  .export-bar { padding: 9px 14px; }
  #employeeName { width: 100px; }
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 72px; right: 16px;
  background: #222; color: #fff;
  padding: 10px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transform: translateY(4px);
  transition: all 0.15s; pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <img src="./logo.png" alt="" onerror="this.style.display='none'">
  <h1>Timesheet</h1>
  <div class="header-spacer"></div>
  <div class="employee-wrap">
    <span class="employee-label">Name</span>
    <input id="employeeName" type="text" placeholder="Your name" autocomplete="name">
  </div>
  <div class="sync-dot" id="syncDot"></div>
</div>

<div class="body">

  <!-- Add entry -->
  <div class="add-card">
    <div class="add-label">What did you work on?</div>
    <textarea class="what-input" id="taskInput" placeholder="Describe your task…" rows="2"></textarea>
    <div class="add-row">
      <div class="dur-pill">
        <select id="durH" class="dur-sel">
          <option value="0">0</option><option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option><option value="5">5</option>
          <option value="6">6</option><option value="7">7</option><option value="8">8</option>
          <option value="9">9</option><option value="10">10</option>
        </select>
        <span class="dur-sep">h</span>
        <select id="durM" class="dur-sel">
          <option value="00">00</option><option value="15">15</option>
          <option value="30">30</option><option value="45">45</option>
        </select>
        <span class="dur-sep">m</span>
      </div>
      <select class="cat-pill" id="categorySelect">
        <option value="general">General</option>
        <option value="meeting">Meeting</option>
        <option value="dev">Development</option>
        <option value="design">Design</option>
        <option value="review">Review</option>
        <option value="admin">Admin</option>
        <option value="marketing">Marketing</option>
      </select>
      <button class="add-btn" onclick="addEntry()" title="Add entry">+</button>
    </div>
  </div>

  <!-- Date nav -->
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDay(-1)">&#8249;</button>
    <span class="date-nav-label" id="dateLabel"></span>
    <button class="today-btn" id="todayBtn" onclick="goToday()">Today</button>
    <button class="nav-btn" onclick="changeDay(1)">&#8250;</button>
  </div>

  <!-- Pay period / week total -->
  <div class="period-bar">
    <span class="period-label">Pay Period</span>
    <span class="period-val" id="periodTotal">—</span>
    <span class="period-range" id="periodRange"></span>
  </div>

  <!-- Day section -->
  <div class="day-section">
    <div class="day-header">
      <span class="day-name" id="dayName"></span>
      <div class="day-hours-row">
        <label>In</label>
        <div class="time-pick">
          <select id="dayStartH" onchange="saveDayHours()"></select>
          <span class="time-colon">:</span>
          <select id="dayStartM" onchange="saveDayHours()">
            <option value="00">00</option><option value="15">15</option>
            <option value="30">30</option><option value="45">45</option>
          </select>
          <select id="dayStartA" onchange="saveDayHours()">
            <option value="AM">AM</option><option value="PM">PM</option>
          </select>
        </div>
        <span class="day-sep">›</span>
        <label>Out</label>
        <div class="time-pick">
          <select id="dayEndH" onchange="saveDayHours()"></select>
          <span class="time-colon">:</span>
          <select id="dayEndM" onchange="saveDayHours()">
            <option value="00">00</option><option value="15">15</option>
            <option value="30">30</option><option value="45">45</option>
          </select>
          <select id="dayEndA" onchange="saveDayHours()">
            <option value="AM">AM</option><option value="PM">PM</option>
          </select>
        </div>
      </div>
      <span class="day-total" id="dayTotal"></span>
    </div>
    <div id="entriesList"></div>
  </div>

  <!-- Export bar -->
  <div class="export-bar">
    <span class="period-badge" id="exportPeriodLabel"></span>
    <button class="exp-btn primary" onclick="exportCompiled()">&#8595; Compiled</button>
    <button class="exp-btn" onclick="exportDetailed()">&#8595; Detailed</button>
    <button class="exp-btn" onclick="exportCSV()">CSV</button>
  </div>

</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Edit Entry</h2>
    <textarea id="editText"></textarea>
    <div class="modal-row">
      <div class="dur-pill" style="flex:1;">
        <select id="editDurH" class="dur-sel">
          <option value="0">0</option><option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option><option value="5">5</option>
          <option value="6">6</option><option value="7">7</option><option value="8">8</option>
          <option value="9">9</option><option value="10">10</option>
        </select>
        <span class="dur-sep">h</span>
        <select id="editDurM" class="dur-sel">
          <option value="00">00</option><option value="15">15</option>
          <option value="30">30</option><option value="45">45</option>
        </select>
        <span class="dur-sep">m</span>
      </div>
      <select class="cat-pill" id="editCategory"></select>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal()">Cancel</button>
      <button class="save-btn" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://uvzwhhwzelaelfhfkvdb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EbFMfEbyEp3gASl-GZm3tQ_LnPEe5do';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentDate = todayKey();
let editingId   = null;
let dayCache    = {};
let dayMeta     = {};

// ── Helpers ──────────────────────────────────────────────────────
function todayKey() {
  return new Intl.DateTimeFormat('en-CA').format(new Date());
}

function pad(n) { return String(n).padStart(2,'0'); }

function formatDateLabel(key) {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

function shortDayName(key) {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();
}

function parseDuration(str) {
  if (!str) return 0;
  str = str.toLowerCase().trim();
  const colon = str.match(/^(\d+):(\d+)$/);
  if (colon) return parseInt(colon[1])*60 + parseInt(colon[2]);
  let mins = 0;
  const h = str.match(/(\d+\.?\d*)\s*h(?:r|rs|our|ours)?/);
  if (h) mins += parseFloat(h[1]) * 60;
  const m = str.match(/(\d+)\s*m(?:in|ins|inute|inutes)?/);
  if (m) mins += parseInt(m[1]);
  if (!h && !m) { const p = str.match(/^(\d+\.?\d*)$/); if (p) mins = parseFloat(p[1]); }
  return Math.round(mins);
}

function formatMins(mins) {
  if (!mins || mins <= 0) return '0m';
  const h = Math.floor(mins/60), m = mins%60;
  return h > 0 ? `${h}h${m > 0 ? ' '+m+'m':''}` : `${m}m`;
}

function minsToDecimal(mins) {
  return (mins / 60).toFixed(2);
}

function formatTime12(t24) {
  if (!t24) return '';
  const [h, m] = t24.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${pad(m)} ${ampm}`;
}

function getPayPeriod(dateKey) {
  const [y,m,d] = dateKey.split('-').map(Number);
  if (d <= 15) {
    return {
      start: `${y}-${pad(m)}-01`,
      end:   `${y}-${pad(m)}-15`,
      label: `${m}/1 – ${m}/15`
    };
  } else {
    const lastDay = new Date(y, m, 0).getDate();
    return {
      start: `${y}-${pad(m)}-16`,
      end:   `${y}-${pad(m)}-${pad(lastDay)}`,
      label: `${m}/16 – ${m}/${lastDay}`
    };
  }
}

// ── Duration dropdowns ────────────────────────────────────────────
function getDur(prefix) {
  const h = document.getElementById(prefix+'H').value;
  const m = document.getElementById(prefix+'M').value;
  if (h === '0' && m === '00') return null;
  return `${h}:${m}`;
}

function setDur(prefix, val) {
  const mins = parseDuration(val || '');
  const h = Math.min(Math.floor(mins/60), 10);
  const m = mins % 60;
  const mSnap = [0,15,30,45].reduce((a,b) => Math.abs(b-m) < Math.abs(a-m) ? b : a);
  document.getElementById(prefix+'H').value = String(h);
  document.getElementById(prefix+'M').value = String(mSnap).padStart(2,'0');
}

function resetDur(prefix) {
  document.getElementById(prefix+'H').value = '0';
  document.getElementById(prefix+'M').value = '00';
}

// ── Sync indicator ────────────────────────────────────────────────
function syncState(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state ? ' '+state : '');
  if (state === 'saved') setTimeout(() => syncState(''), 1500);
}

// ── Supabase ──────────────────────────────────────────────────────
function rowToEntry(r) {
  return { id: r.id, text: r.description, duration: r.duration||'', cat: r.category };
}

async function fetchDay(date) {
  syncState('saving');
  const [entriesRes, metaRes] = await Promise.all([
    sb.from('timesheet_entries').select('*').eq('entry_date', date).order('created_at'),
    sb.from('timesheet_days').select('*').eq('entry_date', date).maybeSingle()
  ]);
  dayCache[date] = (entriesRes.data||[]).map(rowToEntry);
  dayMeta[date]  = metaRes.data || { day_start: null, day_end: null };
  syncState('');
}

async function fetchPeriodTotal() {
  const { start, end, label } = getPayPeriod(currentDate);
  const { data } = await sb.from('timesheet_entries').select('duration').gte('entry_date', start).lte('entry_date', end);
  const total = (data||[]).reduce((s,r) => s + parseDuration(r.duration), 0);
  document.getElementById('periodTotal').textContent = formatMins(total);
  document.getElementById('periodRange').textContent = label;
  document.getElementById('exportPeriodLabel').textContent = label;
}

function getDayEntries() { return dayCache[currentDate] || []; }
function getDayMeta()    { return dayMeta[currentDate]  || {}; }

// ── Time picker ───────────────────────────────────────────────────
function buildHourOptions() {
  return Array.from({length:12}, (_,i) => {
    const v = String(i+1);
    return `<option value="${v}">${v}</option>`;
  }).join('');
}

function setTimePicker(prefix, val24) {
  if (!val24) return;
  const [h24,m] = val24.split(':').map(Number);
  const ampm = h24 >= 12 ? 'PM' : 'AM';
  let h12 = h24 % 12; if (h12 === 0) h12 = 12;
  const mSnap = [0,15,30,45].reduce((a,b) => Math.abs(b-m) < Math.abs(a-m) ? b : a);
  document.getElementById(prefix+'H').value = String(h12);
  document.getElementById(prefix+'M').value = String(mSnap).padStart(2,'0');
  document.getElementById(prefix+'A').value = ampm;
}

function getTimePicker(prefix) {
  const h12 = parseInt(document.getElementById(prefix+'H').value);
  const m   = document.getElementById(prefix+'M').value;
  const a   = document.getElementById(prefix+'A').value;
  if (!h12) return null;
  let h24 = h12 % 12;
  if (a === 'PM') h24 += 12;
  return `${pad(h24)}:${m}`;
}

// ── Day hours ─────────────────────────────────────────────────────
async function saveDayHours() {
  const start = getTimePicker('dayStart');
  const end   = getTimePicker('dayEnd');
  dayMeta[currentDate] = { day_start: start, day_end: end };
  renderDayBar();
  syncState('saving');
  await sb.from('timesheet_days').upsert({
    entry_date: currentDate, day_start: start, day_end: end,
    updated_at: new Date().toISOString()
  }, { onConflict: 'entry_date' });
  syncState('saved');
}

function renderDayBar() {
  const meta = getDayMeta();
  setTimePicker('dayStart', meta.day_start);
  setTimePicker('dayEnd',   meta.day_end);
  if (meta.day_start && meta.day_end) {
    const [sh,sm] = meta.day_start.split(':').map(Number);
    const [eh,em] = meta.day_end.split(':').map(Number);
    const mins = (eh*60+em)-(sh*60+sm);
    document.getElementById('dayTotal').textContent = mins > 0 ? formatMins(mins) : '';
  } else {
    document.getElementById('dayTotal').textContent = '';
  }
}

// ── Nav ───────────────────────────────────────────────────────────
async function changeDay(delta) {
  const [y,m,d] = currentDate.split('-').map(Number);
  const nd = new Date(y, m-1, d+delta);
  currentDate = `${nd.getFullYear()}-${pad(nd.getMonth()+1)}-${pad(nd.getDate())}`;
  if (!dayCache[currentDate]) await fetchDay(currentDate);
  fetchPeriodTotal();
  render();
}

async function goToday() {
  currentDate = todayKey();
  if (!dayCache[currentDate]) await fetchDay(currentDate);
  fetchPeriodTotal();
  render();
}

// ── Add ───────────────────────────────────────────────────────────
async function addEntry() {
  const text = document.getElementById('taskInput').value.trim();
  if (!text) { toast('Write what you worked on first.'); return; }
  const duration = getDur('dur');
  const cat      = document.getElementById('categorySelect').value;
  syncState('saving');
  const { data, error } = await sb.from('timesheet_entries').insert({
    entry_date: currentDate, description: text,
    duration: duration, category: cat
  }).select().single();
  if (error) { syncState('error'); toast('Save failed'); return; }
  if (!dayCache[currentDate]) dayCache[currentDate] = [];
  dayCache[currentDate].push(rowToEntry(data));
  document.getElementById('taskInput').value = '';
  resetDur('dur');
  syncState('saved');
  render();
  fetchPeriodTotal();
  toast('Entry added');
}

// ── Delete ────────────────────────────────────────────────────────
async function deleteEntry(id) {
  syncState('saving');
  const { error } = await sb.from('timesheet_entries').delete().eq('id', id);
  if (error) { syncState('error'); toast('Delete failed'); return; }
  dayCache[currentDate] = getDayEntries().filter(e => e.id !== id);
  syncState('saved');
  render();
  fetchPeriodTotal();
}

// ── Edit ──────────────────────────────────────────────────────────
function openEdit(id) {
  const entry = getDayEntries().find(e => e.id === id);
  if (!entry) return;
  editingId = id;
  document.getElementById('editText').value = entry.text;
  setDur('editDur', entry.duration);
  const sel = document.getElementById('editCategory');
  sel.innerHTML = document.getElementById('categorySelect').innerHTML;
  sel.value = entry.cat;
  document.getElementById('editModal').classList.add('show');
  setTimeout(() => document.getElementById('editText').focus(), 50);
}

async function saveEdit() {
  const text = document.getElementById('editText').value.trim();
  if (!text) return;
  const updates = {
    description: text,
    duration:    getDur('editDur'),
    category:    document.getElementById('editCategory').value
  };
  syncState('saving');
  const { error } = await sb.from('timesheet_entries').update(updates).eq('id', editingId);
  if (error) { syncState('error'); toast('Update failed'); return; }
  dayCache[currentDate] = getDayEntries().map(e =>
    e.id !== editingId ? e : { ...e, text: updates.description, duration: updates.duration||'', cat: updates.category }
  );
  closeModal(); syncState('saved'); render(); fetchPeriodTotal(); toast('Entry updated');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
  editingId = null;
}

// ── Render ────────────────────────────────────────────────────────
const CAT_CLASS = { general:'cat-general', meeting:'cat-meeting', design:'cat-design', dev:'cat-dev', review:'cat-review', admin:'cat-admin', marketing:'cat-marketing' };

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function render() {
  document.getElementById('dateLabel').textContent = formatDateLabel(currentDate);
  document.getElementById('dayName').textContent   = shortDayName(currentDate);
  document.getElementById('todayBtn').style.display = currentDate === todayKey() ? 'none' : '';
  renderDayBar();

  const entries   = getDayEntries();
  const list      = document.getElementById('entriesList');
  const totalMins = entries.reduce((s,e) => s + parseDuration(e.duration), 0);

  if (entries.length === 0) {
    list.innerHTML = `<div class="empty-day">No entries yet for this day.</div>`;
  } else {
    list.innerHTML = entries.map(e => {
      const mins     = parseDuration(e.duration);
      const durLabel = mins > 0 ? formatMins(mins) : '';
      return `
        <div class="entry-row">
          <div class="entry-dot"></div>
          <div class="entry-body">
            <div class="entry-desc">${escHtml(e.text)}</div>
            <div class="entry-tags">
              <span class="tag ${CAT_CLASS[e.cat]||'cat-general'}">${e.cat}</span>
            </div>
          </div>
          <div class="entry-right">
            <span class="entry-dur">${durLabel}</span>
            <div class="entry-actions">
              <button onclick="openEdit(${e.id})" title="Edit">&#9998;</button>
              <button class="del" onclick="deleteEntry(${e.id})" title="Delete">&#10005;</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  if (totalMins > 0) {
    const cur = document.getElementById('dayTotal').textContent;
    if (!cur) document.getElementById('dayTotal').textContent = formatMins(totalMins)+' tracked';
  }
}

// ── Excel exports ─────────────────────────────────────────────────
function getEmployeeName() {
  return document.getElementById('employeeName').value.trim() || 'Employee';
}

function timesheetHeader(year, employeeName) {
  return [
    ['North Star Historical Conservancy'],
    ['Julia Morgan - Est 1905'],
    [''],[''],[''],
    ['Date','Time In','Time Out','Duration','',`Employee: ${employeeName} ${year}`],
    ['']
  ];
}

function safeSheet(name) {
  // Excel sheet names: max 31 chars, no / \ ? * [ ]
  return name.replace(/[\/\\?\*\[\]]/g, '-').slice(0, 31);
}

function makeWorkbook(rows, colWidths, sheetName) {
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = colWidths.map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, safeSheet(sheetName));
  return wb;
}

async function exportCompiled() {
  const { start, end, label } = getPayPeriod(currentDate);
  syncState('saving');
  const [entriesRes, metaRes] = await Promise.all([
    sb.from('timesheet_entries').select('*').gte('entry_date', start).lte('entry_date', end).order('entry_date').order('created_at'),
    sb.from('timesheet_days').select('*').gte('entry_date', start).lte('entry_date', end)
  ]);
  if (entriesRes.error) { syncState('error'); return; }

  const metaMap = {};
  for (const m of (metaRes.data||[])) metaMap[m.entry_date] = m;

  // Group entries by date
  const byDate = {};
  for (const r of (entriesRes.data||[])) {
    if (!byDate[r.entry_date]) byDate[r.entry_date] = [];
    byDate[r.entry_date].push(r);
  }

  const year = currentDate.split('-')[0];
  const name = getEmployeeName();
  const rows = timesheetHeader(year, name);

  for (const date of Object.keys(byDate).sort()) {
    const dayEntries = byDate[date];
    const meta       = metaMap[date] || {};
    const totalMins  = dayEntries.reduce((s,e) => s + parseDuration(e.duration||''), 0);
    const desc       = dayEntries.map(e => e.description).filter(Boolean).join('; ');
    const [y,m,d]    = date.split('-').map(Number);
    const dateStr    = `${m}/${d}/${String(y).slice(2)}`;
    rows.push([dateStr, formatTime12(meta.day_start), formatTime12(meta.day_end), totalMins > 0 ? parseFloat(minsToDecimal(totalMins)) : '', '', desc]);
    rows.push(['']); // blank row between days like their template
  }

  try {
    XLSX.writeFile(makeWorkbook(rows, [10,10,10,10,4,70], `Compiled`), `timesheet_compiled_${start}_${end}.xlsx`);
    syncState('saved');
    toast('Compiled exported');
  } catch(e) { syncState('error'); toast('Export failed: ' + e.message); }
}

async function exportDetailed() {
  const { start, end, label } = getPayPeriod(currentDate);
  syncState('saving');
  const [entriesRes, metaRes] = await Promise.all([
    sb.from('timesheet_entries').select('*').gte('entry_date', start).lte('entry_date', end).order('entry_date').order('created_at'),
    sb.from('timesheet_days').select('*').gte('entry_date', start).lte('entry_date', end)
  ]);
  if (entriesRes.error) { syncState('error'); return; }

  const metaMap = {};
  for (const m of (metaRes.data||[])) metaMap[m.entry_date] = m;

  const year = currentDate.split('-')[0];
  const name = getEmployeeName();
  const rows = [
    ['North Star Historical Conservancy'],
    ['Julia Morgan - Est 1905'],
    [''],[''],[''],
    ['Date','Time In','Time Out','Duration','Category',`Employee: ${name} ${year}`],
    ['']
  ];

  for (const r of (entriesRes.data||[])) {
    const meta    = metaMap[r.entry_date] || {};
    const mins    = parseDuration(r.duration||'');
    const [y,m,d] = r.entry_date.split('-').map(Number);
    rows.push([
      `${m}/${d}/${String(y).slice(2)}`,
      formatTime12(meta.day_start),
      formatTime12(meta.day_end),
      mins > 0 ? parseFloat(minsToDecimal(mins)) : '',
      r.category,
      r.description||''
    ]);
  }

  try {
    XLSX.writeFile(makeWorkbook(rows, [10,10,10,10,12,60], `Detailed`), `timesheet_detailed_${start}_${end}.xlsx`);
    syncState('saved');
    toast('Detailed exported');
  } catch(e) { syncState('error'); toast('Export failed: ' + e.message); }
}

function exportCSV() {
  const entries = getDayEntries();
  if (!entries.length) { toast('No entries to export.'); return; }
  const meta = getDayMeta();
  const rows = [['Date','Time In','Time Out','Duration','Category','Description']];
  for (const e of entries) {
    const mins = parseDuration(e.duration);
    rows.push([currentDate, formatTime12(meta.day_start), formatTime12(meta.day_end),
      mins > 0 ? minsToDecimal(mins) : '', e.cat, '"'+(e.text||'').replace(/"/g,'""')+'"']);
  }
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'})),
    download: `timesheet_${currentDate}.csv`
  });
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV exported');
}

// ── Employee name persistence ─────────────────────────────────────
const nameInput = document.getElementById('employeeName');
nameInput.value = localStorage.getItem('ts_employee') || '';
nameInput.addEventListener('input', () => localStorage.setItem('ts_employee', nameInput.value));

// ── Init ──────────────────────────────────────────────────────────
const hourOpts = buildHourOptions();
document.getElementById('dayStartH').innerHTML = hourOpts;
document.getElementById('dayEndH').innerHTML   = hourOpts;

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); addEntry(); }
});

document.getElementById('editModal').addEventListener('click', e => {
  if (e.target===document.getElementById('editModal')) closeModal();
});

(async () => {
  await fetchDay(currentDate);
  fetchPeriodTotal();
  render();
})();
</script>
